services:
  - type: web
    name: hrmis-saas-api
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask --app run.py db upgrade
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    healthCheckPath: /ready
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: APP_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: hrmis-saas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hrmis-saas-kv
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: hrmis-saas-kv
          property: connectionString
      - key: REDIS_KEY_PREFIX
        value: hrmis:auth

      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_PREFIX
        value: /api

      - key: JWT_COOKIE_SAMESITE
        value: Lax
      - key: JWT_COOKIE_DOMAIN
        sync: false
      - key: TOKEN_EXPIRY_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRY_DAYS
        value: "14"

      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: MAX_CONTENT_LENGTH
        value: "10485760"

      - key: AUTH_MAX_FAILED_ATTEMPTS
        value: "5"
      - key: AUTH_FAILURE_WINDOW_MINUTES
        value: "15"
      - key: AUTH_LOCKOUT_MINUTES
        value: "15"
      - key: AUTH_SUSPICIOUS_LOGIN_ENABLED
        value: "true"
      - key: TRUST_PROXY_HEADERS
        value: "false"
      - key: RATELIMIT_DEFAULT
        value: 200 per day;50 per hour

      - key: PASSWORD_RESET_TOKEN_MINUTES
        value: "30"
      - key: EMAIL_VERIFICATION_TOKEN_HOURS
        value: "24"
      - key: PASSWORD_RESET_URL
        sync: false
      - key: EMAIL_VERIFICATION_URL
        sync: false

      - key: MFA_REQUIRED_ROLES
        value: SUPER_ADMIN,CLIENT_ADMIN
      - key: MFA_CHALLENGE_MINUTES
        value: "5"
      - key: MFA_MAX_CHALLENGE_ATTEMPTS
        value: "5"
      - key: MFA_TOTP_ISSUER
        value: HRMIS
      - key: MFA_TOTP_VALID_WINDOW
        value: "1"
      - key: MFA_RECOVERY_CODE_COUNT
        value: "10"
      - key: MFA_ENCRYPTION_KEYS
        sync: false
      - key: MFA_RECOVERY_CODE_PEPPER
        sync: false

      - key: MAIL_TRANSPORT
        value: smtp
      - key: MAIL_FROM
        sync: false
      - key: MAIL_SMTP_HOST
        sync: false
      - key: MAIL_SMTP_PORT
        value: "587"
      - key: MAIL_SMTP_USERNAME
        sync: false
      - key: MAIL_SMTP_PASSWORD
        sync: false
      - key: MAIL_SMTP_USE_TLS
        value: "true"
      - key: MAIL_SMTP_TIMEOUT_SECONDS
        value: "10"

    disk:
      name: hrmis-saas-uploads
      mountPath: /var/data
      sizeGB: 1

  - type: keyvalue
    name: hrmis-saas-kv
    plan: starter
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot

databases:
  - name: hrmis-saas-db
    plan: basic-256mb
    region: frankfurt
    databaseName: hrmis_saas
    user: hrmis_saas_user
    ipAllowList: []
