services:
  - type: web
    name: hrmis-saas-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && flask --app run.py db upgrade
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hrmis-saas-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: TOKEN_EXPIRY_MINUTES
        value: "60"
      - key: MAX_CONTENT_LENGTH
        value: "10485760"
    disk:
      name: hrmis-saas-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: hrmis-saas-db
    plan: starter
    databaseName: hrmis_saas
    user: hrmis_saas_user
